# backend/docker-compose.yml
version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4242:4242"
    env_file: .env
    environment:
      - TZ=America/Sao_Paulo
      - MONGO_URI=mongodb://root:${DB_PASSWORD}@mongodb:27017/checkout?authSource=admin
    # ALWAYS garante restart mesmo após docker stop manual ou reboot do servidor
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app_network
    # ============================================
    # SISTEMA DE AUTO-HEAL (3 CAMADAS)
    # ============================================
    #
    # CAMADA 1 - Watchdog interno (Node.js):
    #   Verifica MongoDB + memória a cada 30s
    #   Após 5 falhas consecutivas (2.5 min) → process.exit(1)
    #   Docker restart policy reinicia automaticamente
    #
    # CAMADA 2 - Docker healthcheck + autoheal:
    #   Healthcheck verifica /health a cada 15s
    #   3 falhas consecutivas (45s) → marcado unhealthy
    #   Autoheal detecta (em até 10s) e reinicia
    #
    # CAMADA 3 - healthcheck.sh kill (última defesa):
    #   Se 20 falhas consecutivas (~5 min) e nenhuma camada agiu,
    #   healthcheck.sh força kill do processo Node.js
    #   Docker restart policy reinicia o container
    #
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 15s        # Verifica a cada 15 segundos
      timeout: 10s         # Timeout do check
      retries: 3           # 3 falhas consecutivas = unhealthy
      start_period: 150s   # 2.5 min de carência (API demora 1-2 min para subir)
    # Labels para autoheal
    labels:
      - "autoheal=true"
    # Limites de recursos para prevenir OOM
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  mongodb:
    image: mongo:6.0
    restart: always
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=${DB_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network
    # Healthcheck do MongoDB (usa credenciais de admin)
    healthcheck:
      test: ["CMD", "mongosh", "-u", "root", "-p", "${DB_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # AUTOHEAL - Camada 2 de proteção
  # ============================================
  # Reinicia containers marcados unhealthy pelo Docker healthcheck
  # Funciona como backup - a camada 1 (watchdog interno) cobre a maioria dos casos
  autoheal:
    image: willfarrell/autoheal:latest
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=10
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=30
      - AUTOHEAL_START_PERIOD=180  # Ignora containers nos primeiros 3 min (startup)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    # Healthcheck para o próprio autoheal (se ele travar, Docker reinicia)
    healthcheck:
      test: ["CMD", "pidof", "autoheal"]
      interval: 60s
      timeout: 5s
      retries: 3
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  mongo_data: